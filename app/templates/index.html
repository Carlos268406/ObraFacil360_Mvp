<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ObraFácil 360</title>
</head>
<body>
    <h2>Conte sobre sua obra</h2>
    <form action="/enviar" method="POST">
        <input type="text" name="nome" placeholder="Seu nome" required><br><br>
        <input type="text" name="servico" placeholder="Qual serviço?" required><br><br>
        <input type="text" name="bairro" placeholder="Seu bairro" required><br><br>
        <button type="submit">Solicitar serviço</button>
    </form>
</body>
</html>
